# Q2 SFT of Qwen3-1.7B-Base on the docentesDC instruction pairs (full-parameter,
# completion-only loss). Fits one L4 with gradient checkpointing. A/B override:
#   python scripts/train.py --config configs/sft_docentes_qwen3_1p7b.yaml \
#     --model-name outputs/pretrain_qwen3_1p7b_diarios \
#     --output-dir outputs/sft_qwen3_1p7b_q1
name: sft_docentes_qwen3_1p7b
seed: 42

model:
  type: local
  params:
    model_name: models/Qwen3-1.7B-Base
    dtype: bfloat16

dataset:
  type: sft_pairs
  params:
    path: data/processed/sft/docentes_sft_train.jsonl

trainer:
  type: sft
  params:
    output_dir: outputs/sft_qwen3_1p7b_base
    max_length: 1024
    num_train_epochs: 3
    learning_rate: 0.00002
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8
    warmup_ratio: 0.03
    logging_steps: 20
    bf16: true
    gradient_checkpointing: true
