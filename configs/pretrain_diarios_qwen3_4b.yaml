# Q1 continued pre-training of Qwen3-4B-Base (full-parameter) on the diarios
# corpus. Full-parameter 4B does not fit in 2x L4 with fp32 AdamW state on-GPU
# (~24-32 GB/GPU), so FSDP full-shard runs with CPU offload of params/grads/
# optimizer (~48 GB host RAM, fits the 62.9 GB node) plus activation
# checkpointing. Slower than on-GPU but reliable for an unattended queued job.
# per_device batch 1 (accum 8). Same recipe family as 0.6B/1.7B; only the model,
# the batch/accum split and the offload change. Evaluate antes/depois with
# scripts/evaluate.py.
#
# Launch (2 GPUs, same node):
#   torchrun --nproc_per_node=2 scripts/train.py \
#     --config configs/pretrain_diarios_qwen3_4b.yaml
# On SLURM, submit scripts/slurm/pretrain_qwen3_4b.sbatch (requests gpu:l4:2).
name: pretrain_diarios_qwen3_4b
seed: 42

model:
  type: local
  params:
    model_name: models/Qwen3-4B-Base
    dtype: bfloat16

dataset:
  type: text_corpus
  params:
    input_dir: data/processed/diarios_txt
    pattern: "*.txt"

trainer:
  type: continual_pretrain
  params:
    output_dir: outputs/pretrain_qwen3_4b_diarios
    block_size: 1024
    num_train_epochs: 1
    learning_rate: 0.00002
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 8
    warmup_ratio: 0.03
    logging_steps: 20
    bf16: true
    gradient_checkpointing: true
    optim: adamw_torch
    # FSDP CPU offload puts grads on CPU; grad-norm clipping then needs a CPU
    # backend (gloo) that is not initialized, raising "No backend type ... cpu".
    # Disable clipping (low LR makes it unnecessary) so the offload path works.
    max_grad_norm: 0
    fsdp: "full_shard auto_wrap offload"
    fsdp_config:
      transformer_layer_cls_to_wrap: ["Qwen3DecoderLayer"]
      state_dict_type: FULL_STATE_DICT
