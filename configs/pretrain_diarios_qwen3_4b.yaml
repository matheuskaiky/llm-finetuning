# Q1 continued pre-training of Qwen3-4B-Base (full-parameter) on the diarios
# corpus. Full-parameter 4B does not fit in 2x L4 with fp32 AdamW state on-GPU
# (~24-32 GB/GPU), so FSDP full-shard runs with CPU offload of params/grads/
# optimizer (~48 GB host RAM, fits the 62.9 GB node) plus activation
# checkpointing. Slower than on-GPU but reliable for an unattended queued job.
# per_device batch 1 (accum 8). Same recipe family as 0.6B/1.7B; only the model,
# the batch/accum split and the offload change. Evaluate antes/depois with
# scripts/evaluate.py.
#
# Launch (2 GPUs, same node):
#   torchrun --nproc_per_node=2 scripts/train.py \
#     --config configs/pretrain_diarios_qwen3_4b.yaml
# On SLURM, submit scripts/slurm/pretrain_qwen3_4b.sbatch (requests gpu:l4:2).
name: pretrain_diarios_qwen3_4b
seed: 42

model:
  type: local
  params:
    model_name: models/Qwen3-4B-Base
    dtype: bfloat16

dataset:
  type: text_corpus
  params:
    input_dir: data/processed/diarios_txt
    pattern: "*.txt"

trainer:
  type: continual_pretrain
  params:
    output_dir: outputs/pretrain_qwen3_4b_diarios
    block_size: 1024
    num_train_epochs: 1
    learning_rate: 0.00002
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 8
    warmup_ratio: 0.03
    logging_steps: 20
    bf16: true
    gradient_checkpointing: true
    optim: adamw_torch_8bit
    # KNOWN LIMITATION (see NOTAS 2026-06-17): 4B full-parameter FT does not fit
    # 2x L4 (22 GB usable each) under this software stack. No optimizer config works:
    #  1. adamw_torch + FSDP offload: grads on CPU, grad-norm needs gloo -> backend err.
    #  2. adamw_bnb_8bit (bitsandbytes) + full_shard: DTensor params, no sharding
    #     strategy -> NotImplementedError on optimizer_update_32bit.
    #  3. adamw_torch_8bit (torchao) + torch.compile: dynamo traces OptimState8bit
    #     and hits unimplemented aten.view.dtype.
    #  4. adamw_torch_8bit (torchao) eager (TORCHDYNAMO_DISABLE=1): DTensor sharding
    #     propagation for aten.lerp.Scalar fails on bf16 param vs fp32 optim state.
    #  - plain adamw_torch + full_shard (fp32 Adam, ~16 GB/GPU): OOM at the loss with
    #    21.45/22 GB already used.
    # The 0.6B/1.7B base ladder covers Q1; 4B stays an attempted, hardware-bound
    # extension. QLoRA would fit but is PEFT (Q3), out of scope for full-FT Q1.
    fsdp: "full_shard auto_wrap"
    fsdp_config:
      transformer_layer_cls_to_wrap: ["Qwen3DecoderLayer"]
      state_dict_type: FULL_STATE_DICT
