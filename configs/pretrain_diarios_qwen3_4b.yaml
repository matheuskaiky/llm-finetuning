# Q1 continued pre-training of Qwen3-4B-Base (full-parameter) on the diarios
# corpus. This is the realistic full-parameter ceiling on 2x L4: FSDP full-shard +
# activation checkpointing, AdamW 32-bit. per_device batch 1 (accum 8) to stay
# inside 24 GB/GPU. Same recipe family as 0.6B/1.7B; only the model and the
# batch/accum split change. Evaluate antes/depois with scripts/evaluate.py.
#
# Launch:
#   torchrun --nproc_per_node=2 scripts/train.py \
#     --config configs/pretrain_diarios_qwen3_4b.yaml
name: pretrain_diarios_qwen3_4b
seed: 42

model:
  type: local
  params:
    model_name: models/Qwen3-4B-Base
    dtype: bfloat16

dataset:
  type: text_corpus
  params:
    input_dir: data/processed/diarios_txt
    pattern: "*.txt"

trainer:
  type: continual_pretrain
  params:
    output_dir: outputs/pretrain_qwen3_4b_diarios
    block_size: 1024
    num_train_epochs: 1
    learning_rate: 0.00002
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 8
    warmup_ratio: 0.03
    logging_steps: 20
    bf16: true
    gradient_checkpointing: true
    optim: adamw_torch
    fsdp: "full_shard auto_wrap"
    fsdp_config:
      transformer_layer_cls_to_wrap: ["Qwen3DecoderLayer"]
      state_dict_type: FULL_STATE_DICT
