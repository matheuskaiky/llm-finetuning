# Q1: continued pre-training of a small base model (full-parameter) on the diarios
# corpus. Qwen3-0.6B-Base fits a full fine-tune on a single L4 with plain AdamW, so
# Q1 stays in scope (no LoRA/QLoRA, no offload). Evaluates antes/depois.
name: pretrain_diarios_qwen3_0p6b
seed: 42

model:
  type: local
  params:
    model_name: models/Qwen3-0.6B-Base
    dtype: bfloat16

dataset:
  type: text_corpus
  params:
    input_dir: data/processed/diarios_txt
    pattern: "*.txt"

trainer:
  type: continual_pretrain
  params:
    output_dir: outputs/pretrain_qwen3_0p6b_diarios
    block_size: 1024
    num_train_epochs: 1
    learning_rate: 0.00002
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 4
    warmup_ratio: 0.03
    logging_steps: 20
    bf16: true

evaluation:
  metrics: [perplexity, cross_entropy, token_accuracy]
  benchmark: benchmarks/pre_treino/diarios_qa.jsonl
  max_length: 1024
  output_path: benchmarks/pre_treino/results/depois/pretrain_qwen3_0p6b.json
