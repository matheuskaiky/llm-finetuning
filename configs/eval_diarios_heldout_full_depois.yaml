# Q1 held-out perplexity on the FULL-run held-out set (last 2000 docs, disjoint
# from data/processed/diarios_txt_full), AFTER training. Model is the full-corpus
# continued-pretraining checkpoint.
name: eval_diarios_heldout_full_depois
seed: 42

model:
  type: local
  params:
    model_name: outputs/pretrain_qwen3_0p6b_diarios_full
    dtype: bfloat16

evaluation:
  metrics: [perplexity, cross_entropy, token_accuracy]
  benchmark: data/processed/diarios_heldout_full.jsonl
  max_length: 512
  stride: 0
  output_path: benchmarks/pre_treino/results/depois_full/heldout_full.json
