# Q1: continued pre-training of gpt2-medium (full-parameter) on the diarios corpus.
# GPT-2 family (English BPE, vocab 50257, max context 1024) as a pioneer-model
# baseline alongside the modern Qwen/gemma ladder. Small enough for full FT on one
# L4 with plain AdamW. Evaluates antes/depois.
name: pretrain_diarios_gpt2_medium
seed: 42

model:
  type: local
  params:
    model_name: models/gpt2-medium
    dtype: bfloat16

dataset:
  type: text_corpus
  params:
    input_dir: data/processed/diarios_txt
    pattern: "*.txt"

trainer:
  type: continual_pretrain
  params:
    output_dir: outputs/pretrain_gpt2_medium_diarios
    block_size: 1024
    num_train_epochs: 1
    learning_rate: 0.00002
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 4
    warmup_ratio: 0.03
    logging_steps: 20
    bf16: true
    gradient_checkpointing: true
