# Continued pre-training on the gazette corpus (issue #5, Q1).
# Evaluates perplexity/cross-entropy/token-accuracy before and after training.
name: pretrain_diarios
seed: 42

model:
  type: local
  params:
    # Small base model so it runs without a large GPU; swap for the chosen LLM.
    model_name: gpt2

dataset:
  type: text_corpus
  params:
    # Unified .txt corpus consumed as input (produced by Grupo 01) or local share.
    input_dir: data/processed
    pattern: "*.txt"

trainer:
  type: continual_pretrain
  params:
    output_dir: outputs/pretrain_gpt2_diarios
    block_size: 512
    num_train_epochs: 1
    learning_rate: 0.00005
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8
    warmup_ratio: 0.03

evaluation:
  metrics: [perplexity, cross_entropy, token_accuracy]
  benchmark: benchmarks/diarios_qa.jsonl
  max_length: 512
  output_path: benchmarks/results/pretrain_diarios.json
