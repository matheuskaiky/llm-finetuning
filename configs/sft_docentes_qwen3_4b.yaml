# Q2 SFT of Qwen3-4B-Base on the docentesDC instruction pairs (full-parameter,
# completion-only loss). Like the Q1 4B run, 4B does not fit one L4: FSDP
# full_shard + CPU offload over 2 GPUs. Launch via SLURM (2 GPUs) with torchrun.
# A/B override (Q1 checkpoint comes from job 399):
#   torchrun --nproc_per_node=2 scripts/train.py \
#     --config configs/sft_docentes_qwen3_4b.yaml \
#     --model-name outputs/pretrain_qwen3_4b_diarios \
#     --output-dir outputs/sft_qwen3_4b_q1
name: sft_docentes_qwen3_4b
seed: 42

model:
  type: local
  params:
    model_name: models/Qwen3-4B-Base
    dtype: bfloat16

dataset:
  type: sft_pairs
  params:
    path: data/processed/sft/docentes_sft_train.jsonl

trainer:
  type: sft
  params:
    output_dir: outputs/sft_qwen3_4b_base
    max_length: 1024
    num_train_epochs: 3
    learning_rate: 0.00002
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 8
    warmup_ratio: 0.03
    logging_steps: 20
    bf16: true
    gradient_checkpointing: true
    optim: adamw_torch
    # FSDP CPU offload puts grads on CPU; grad-norm clipping then needs a CPU
    # backend (gloo) that is not initialized, raising "No backend type ... cpu".
    # Disable clipping (low LR makes it unnecessary) so the offload path works.
    max_grad_norm: 0
    fsdp: "full_shard auto_wrap offload"
    fsdp_config:
      transformer_layer_cls_to_wrap: ["Qwen3DecoderLayer"]
      state_dict_type: FULL_STATE_DICT
