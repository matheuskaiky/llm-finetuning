# Q2 SFT of Qwen3-0.6B-Base on the docentesDC instruction pairs (full-parameter,
# completion-only loss). Default starting point is the original base; for the
# A/B experiment (does Q1 continued pre-training help SFT?) override the model:
#   python scripts/train.py --config configs/sft_docentes_qwen3_0p6b.yaml \
#     --model-name outputs/pretrain_qwen3_0p6b_diarios \
#     --output-dir outputs/sft_qwen3_0p6b_q1
# Evaluation (judge + response perplexity) is separate, in scripts/eval_sft.py.
name: sft_docentes_qwen3_0p6b
seed: 42

model:
  type: local
  params:
    model_name: models/Qwen3-0.6B-Base
    dtype: bfloat16

dataset:
  type: sft_pairs
  params:
    path: data/processed/sft/docentes_sft_train.jsonl

trainer:
  type: sft
  params:
    output_dir: outputs/sft_qwen3_0p6b_base
    max_length: 1024
    num_train_epochs: 3
    learning_rate: 0.00002
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 4
    warmup_ratio: 0.03
    logging_steps: 20
    bf16: true
