# Q3 LoRA SFT of gpt2 (124M) on the docentesDC pairs (PEFT). Same dataset and
# template as Q2; only LoRA params are trained (PEFT auto-targets gpt2 c_attn),
# then merged into the base so the checkpoint evaluates like a full model. A/B
# override for the Q1 checkpoint:
#   python scripts/train.py --config configs/lora_docentes_gpt2.yaml \
#     --model-name outputs/pretrain_gpt2_diarios --output-dir outputs/lora_gpt2_q1
name: lora_docentes_gpt2
seed: 42

model:
  type: local
  params:
    model_name: models/gpt2
    dtype: bfloat16

dataset:
  type: sft_pairs
  params:
    path: data/processed/sft/docentes_sft_train.jsonl

trainer:
  type: sft
  params:
    output_dir: outputs/lora_gpt2_base
    max_length: 1024
    num_train_epochs: 3
    learning_rate: 0.0002
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 4
    warmup_ratio: 0.03
    logging_steps: 20
    bf16: true
    peft:
      r: 16
      alpha: 32
      dropout: 0.05
      # gpt2 uses Conv1D blocks (c_attn fused qkv, c_proj out/mlp, c_fc mlp),
      # not the Llama/Qwen *_proj names of the default targets.
      target_modules: ["c_attn", "c_proj", "c_fc"]
