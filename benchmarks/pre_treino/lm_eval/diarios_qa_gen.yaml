# LM Eval Harness task: factual QA in generate_until format (SLIDES_BENCHMARK
# secao 4/5). Metric BLEU against the reference answer. Greedy decoding.
task: diarios_qa_gen
dataset_path: json
dataset_kwargs:
  data_files: benchmarks/pre_treino/diarios_qa.jsonl
output_type: generate_until
test_split: train
doc_to_text: "Pergunta: {{instruction}}\nResposta:"
doc_to_target: "{{output}}"
generation_kwargs:
  until:
    - "\n"
  do_sample: false
metric_list:
  - metric: bleu
    higher_is_better: true
metadata:
  version: 1.0
